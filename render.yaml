services:
  - type: web
    name: avila-newsletters
    runtime: docker
    plan: free
    region: virginia
    branch: agent/mailersend-email-templates
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: avila-newsletters-db
          property: connectionString
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: DELIVERY_ENABLED
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production

databases:
  - name: avila-newsletters-db
    plan: free
    region: virginia
    databaseName: avila_newsletters
    user: newsletters
    ipAllowList: []
