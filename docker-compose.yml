name: avila-newsletters

services:
  platform-db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be configured in .env.production}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be configured in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be configured in .env.production}
    ports:
      - "${POSTGRES_BIND_ADDRESS:?POSTGRES_BIND_ADDRESS must be configured in .env.production}:${POSTGRES_PORT:?POSTGRES_PORT must be configured in .env.production}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - platform-data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: ${PORT:?PORT must be configured in .env.production}
      HOST: ${HOST:?HOST must be configured in .env.production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be configured in .env.production}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN must be configured in .env.production}
      DELIVERY_ENABLED: ${DELIVERY_ENABLED:?DELIVERY_ENABLED must be configured in .env.production}
      N8N_INGEST_TOKEN: ${N8N_INGEST_TOKEN:?N8N_INGEST_TOKEN must be configured in .env.production}
    ports:
      - "${APP_BIND_ADDRESS:?APP_BIND_ADDRESS must be configured in .env.production}:${APP_PORT:?APP_PORT must be configured in .env.production}:${PORT:?PORT must be configured in .env.production}"
    depends_on:
      platform-db:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: ["sh", "-c", "node src/platform/migrate.mjs && node src/platform/run-worker.mjs"]
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be configured in .env.production}
      DELIVERY_ENABLED: ${DELIVERY_ENABLED:?DELIVERY_ENABLED must be configured in .env.production}
      N8N_DELIVERY_WEBHOOK_URL: ${N8N_DELIVERY_WEBHOOK_URL:?N8N_DELIVERY_WEBHOOK_URL must be configured in .env.production}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:?N8N_WEBHOOK_SECRET must be configured in .env.production}
      WORKER_POLL_MS: ${WORKER_POLL_MS:?WORKER_POLL_MS must be configured in .env.production}
      WORKER_LOCK_TIMEOUT_MS: ${WORKER_LOCK_TIMEOUT_MS:?WORKER_LOCK_TIMEOUT_MS must be configured in .env.production}
    depends_on:
      platform-db:
        condition: service_healthy
      n8n:
        condition: service_started

  n8n-db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB:?N8N_POSTGRES_DB must be configured in .env.production}
      POSTGRES_USER: ${N8N_POSTGRES_USER:?N8N_POSTGRES_USER must be configured in .env.production}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:?N8N_POSTGRES_PASSWORD must be configured in .env.production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - n8n-data:/var/lib/postgresql/data

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_TYPE: ${DB_TYPE:?DB_TYPE must be configured in .env.production}
      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST:?DB_POSTGRESDB_HOST must be configured in .env.production}
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT:?DB_POSTGRESDB_PORT must be configured in .env.production}
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE:?DB_POSTGRESDB_DATABASE must be configured in .env.production}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER:?DB_POSTGRESDB_USER must be configured in .env.production}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD:?DB_POSTGRESDB_PASSWORD must be configured in .env.production}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be configured in .env.production}
      N8N_INGEST_TOKEN: ${N8N_INGEST_TOKEN:?N8N_INGEST_TOKEN must be configured in .env.production}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:?N8N_WEBHOOK_SECRET must be configured in .env.production}
      PLATFORM_API_URL: ${PLATFORM_API_URL:?PLATFORM_API_URL must be configured in .env.production}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?SMTP_FROM_EMAIL must be configured in .env.production}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:?GENERIC_TIMEZONE must be configured in .env.production}
      TZ: ${TZ:?TZ must be configured in .env.production}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:?N8N_SECURE_COOKIE must be configured in .env.production}
    ports:
      - "${N8N_BIND_ADDRESS:?N8N_BIND_ADDRESS must be configured in .env.production}:${N8N_PORT:?N8N_PORT must be configured in .env.production}:5678"
    depends_on:
      n8n-db:
        condition: service_healthy

volumes:
  platform-data:
  n8n-data:
