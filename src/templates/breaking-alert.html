<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="x-apple-disable-message-reformatting">
    <title>{{title}}</title>
    <style>
      body { margin: 0; background: #f3f4f6; color: #17202a; font-family: Arial, Helvetica, sans-serif; }
      table { border-collapse: collapse; }
      a { color: #0b6b57; }
      .card { width: 100%; max-width: 600px; background: #ffffff; }
      .pad { padding: 32px 40px; }
      .flag { display: inline-block; padding: 6px 9px; border-radius: 4px; background: #b42318; color: #ffffff; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
      h1 { margin: 18px 0 14px; color: #111827; font-size: 31px; line-height: 1.2; }
      .summary { color: #374151; font-size: 17px; line-height: 1.6; }
      .impact { margin: 22px 0; padding: 18px; background: #fff8e1; border-left: 4px solid #f3b61f; color: #374151; font-size: 15px; line-height: 1.55; }
      .button { display: inline-block; padding: 13px 20px; border-radius: 6px; background: #0b6b57; color: #ffffff !important; font-weight: 700; text-decoration: none; }
      .meta, .footer { color: #6b7280; font-size: 12px; line-height: 1.55; }
      @media only screen and (max-width: 600px) { .pad { padding: 24px 20px !important; } h1 { font-size: 27px !important; } }
    </style>
  </head>
  <body>
    <div style="display:none;max-height:0;overflow:hidden;opacity:0">{{preheader}}</div>
    <table role="presentation" width="100%" style="background:#f3f4f6">
      <tr><td align="center" style="padding:24px 12px">
        <table role="presentation" class="card" width="600">
          <tr><td class="pad" style="border-top:5px solid #b42318">
            <div style="color:#0b6b57;font-size:19px;font-weight:700;margin-bottom:24px">ÁVILA OPS</div>
            <span class="flag">{{category}}</span>
            <h1>{{title}}</h1>
            <p class="summary">{{summary}}</p>
            <div class="impact"><strong>Por que importa:</strong> {{why_it_matters}}</div>
            <p class="meta">{{source}} · {{published_at}}</p>
            <p style="margin:26px 0 0"><a class="button" href="{{url}}">Abrir notícia</a></p>
          </td></tr>
          <tr><td class="pad" style="border-top:1px solid #e5e7eb">
            <p class="footer">{{company_address}} · <a href="{{preferences_url}}">Preferências</a> · <a href="{{unsubscribe}}">Cancelar inscrição</a></p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
